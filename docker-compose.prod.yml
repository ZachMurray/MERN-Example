# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  mongodb:
    image: mongo:6.0
    container_name: mern-mongodb-prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mongodb_data_prod:/data/db
      - mongodb_config_prod:/data/configdb
    networks:
      - mern-network-prod
    # Optional: Only expose to internal network
    # ports:
    #   - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mern-backend-prod
    restart: always
    environment:
      MONGODB_URI: mongodb://${DB_USER:-admin}:${DB_PASSWORD}@mongodb:27017/mern-auth?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 7d
      PORT: 5000
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL}
    expose:
      - "5000"
    depends_on:
      - mongodb
    networks:
      - mern-network-prod
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mern-frontend-prod
    restart: always
    environment:
      VITE_API_URL: ${API_URL}
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - mern-network-prod

  nginx:
    image: nginx:alpine
    container_name: mern-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - mern-network-prod

volumes:
  mongodb_data_prod:
  mongodb_config_prod:

networks:
  mern-network-prod:
    driver: bridge
